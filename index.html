<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        #container { width: 100vw; height: 100vh; }
        #map-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1;
        }
        #three-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: none; 
            z-index: 2;
        }
        #error-container {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 1000;
            max-width: 80%;
            max-height: 80%;
            overflow: auto;
        }
        .custom-marker {
            width: 4vw;
            height: 4vw;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .custom-marker:hover {
            transform: scale(1.1);
        }
        #tip-box {
            position: fixed;
            top: 24px;
            right: 24px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 2000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-family: "微软雅黑", Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="map-container"></div>
    <div id="three-container"></div>
    <div id="error-container"></div>
    <div id="tip-box">点击地图上的怪物图标进入对战</div>

    <!-- 加载高德地图 -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=9732610363d21616607c16cabf9c4fe4"></script>

    <script>
        // 错误捕获
        window.onerror = function(message, source, lineno, colno, error) {
            const errorContainer = document.getElementById('error-container');
            errorContainer.innerHTML += `
                <div style="margin-bottom: 10px;">
                    <div style="color: #ff6b6b;">错误信息: ${message}</div>
                    <div style="color: #4ecdc4;">文件: ${source}</div>
                    <div style="color: #45b7d1;">行号: ${lineno}</div>
                    <div style="color: #96ceb4;">列号: ${colno}</div>
                    <div style="color: #ffeead;">堆栈: ${error?.stack || '无'}</div>
                </div>
            `;
            console.error('错误详情:', {message, source, lineno, colno, error});
        };

        // 创建高德地图
        const map = new AMap.Map('map-container', {
            zoom: 15,
            center: [116.397428, 39.90923],
            viewMode: '3D',
            pitch: 45
        });

        // 创建自定义标记
        const markers = [
            {
                position: [116.397428, 39.90923], // 北京天安门
                image: '/images/怪物1.png'
            },
            {
                position: [116.407428, 39.91923], // 天安门东北方向
                image: '/images/怪物2.png'
            },
            {
                position: [116.387428, 39.89923], // 天安门西南方向
                image: '/images/怪物3.png'
            }
        ];

        // 创建并添加所有标记
        markers.forEach((markerData, index) => {
            const marker = new AMap.Marker({
                position: markerData.position,
                content: `<img src="${markerData.image}" class="custom-marker">`,
                offset: new AMap.Pixel(-2, -2),
                zIndex: 100 + index
            });

            // 将标记添加到地图
            map.add(marker);

            // 点击标记时切换到 Three.js 场景
            marker.on('click', () => {
                document.getElementById('map-container').style.display = 'none';
                document.getElementById('three-container').style.display = 'block';
                // 触发 Three.js 场景初始化
                window.dispatchEvent(new Event('initThreeScene'));
                // 隐藏提示框
                document.getElementById('tip-box').style.display = 'none';
            });
        });
    </script>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
